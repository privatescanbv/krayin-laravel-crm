name: Build and push Docker image

on:
  push:
    branches: ["development", "security_scans"]

permissions:
  contents: read
  packages: write

jobs:
  docker-crm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build image
        run: |
          chmod +x ./build_image.sh
          ./build_image.sh

      #############################################
      # Trivy Scan of the built image
      #############################################
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.51.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.51.0_Linux-64bit.deb

      - name: Scan Docker Image with Trivy
        run: |
          trivy image ghcr.io/${{ github.repository }}:latest \
            --format table \
            --output trivy_image_scan.txt \
            || true

      - name: Upload Trivy Image Scan
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy_image_scan.txt
          retention-days: 14
