services:
  laravel.test:
    build:
      context: ./vendor/laravel/sail/runtimes/8.2
      dockerfile: Dockerfile
      #      context: .
      #      dockerfile: ./docker/Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.2/app
    stdin_open: true
    tty: true
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
      - '8000:80'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-debug}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    env_file:
      - .env
    labels:
      - 'dev.orbstack.domains=${TRAEFIK_URL}'
      - traefik.enable=true
      - traefik.http.routers.laravel-template-api-rtr.rule=Host(`$TRAEFIK_URL`)
      - traefik.http.routers.laravel-template-api-rtr.tls=true
      - traefik.http.routers.laravel-template-api-rtr.entrypoints=https
      - traefik.http.routers.laravel-template-api-rtr.service=laravel-template-api-svc
      - traefik.http.services.laravel-template-api-svc.loadbalancer.server.port=80
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
      - mb_traefik
    depends_on:
      - mysql
#      - redis

  mysql:
    image: 'mysql/mysql-server:8.0'
    ports:
      #      - '${FORWARD_DB_PORT:-3306}:3306'
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'sail-mysql:/var/lib/mysql'
      - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
    networks:
      - sail
      - mb_traefik
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-p${DB_PASSWORD}'
      retries: 3
      timeout: 5s

#  krayin-phpmyadmin:
#    image: phpmyadmin:latest
#    restart: always
#    environment:
#      PMA_HOST: krayin-mysql
#      PMA_USER: root
#      PMA_PASSWORD: root
#    ports:
#      - 8080:80 # adjust your port here, if you want to change

networks:
  sail:
    driver: bridge
  mb_traefik:
    external: true
volumes:
  sail-mysql:
    driver: local
#  sail-redis:
#    driver: local
