                properties:
                  message:
                    type: string
                    example: 'Lead created successfully.'
                  lead_id:
                    type: integer
                    example: 123
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 123
      tags:
        - Endpoints
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                  description: 'The <code>id</code> of an existing record in the users table.'
                  example: null
                  nullable: true
  '/api/leads/{id}':
