services:

  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.file.filename=/traefik/tls.yml
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=public
      - --entrypoints.http.address=:80
      - --entrypoints.https.address=:443/tcp
      - --entrypoints.http.http.redirections.entryPoint.to=https
      - --entrypoints.http.http.redirections.entryPoint.scheme=https
    ports:
      - "80:80"
      - "443:443"
      - "8089:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./.docker/traefik_local:/traefik:ro
    networks:
      public:
        aliases:
          - sso.local.privatescan.nl
          - crm.local.privatescan.nl
          - patient.local.privatescan.nl
          - phpmyadmin.local.privatescan.nl

  crm:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      args:
        WWWGROUP: '${WWWGROUP:-1000}'
        WWWUSER: '${WWWUSER:-1000}'
        APP_ENV: 'local'
    image: sail-8.3/crm
    container_name: crm
    stdin_open: true
    tty: true
    ports:
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
      - '${VITE_ADMIN_PORT:-5174}:${VITE_ADMIN_PORT:-5174}'
      - '8000:80'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-debug}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    env_file:
      - .env
    labels:
      - traefik.enable=true
      - traefik.http.routers.crm.rule=Host("crm.local.privatescan.nl")
      - traefik.http.routers.crm.entrypoints=https
      - traefik.http.routers.crm.tls=true
      - traefik.http.routers.crm.tls.domains[0].main=crm.local.privatescan.nl
      - traefik.http.routers.crm.service=crm-svc
      # === APIDOCS ROUTER (afgeschermd) ===
      - traefik.http.routers.crm-apidocs.rule=PathPrefix("/admin/apidocs")
      - traefik.http.routers.crm-apidocs.entrypoints=https
      - traefik.http.routers.crm-apidocs.tls=true
      - traefik.http.routers.crm-apidocs.priority=100
      - traefik.http.routers.crm-apidocs.service=crm-svc
      - traefik.http.routers.crm-apidocs.middlewares=crm-apidocs-auth
      # === BASIC AUTH MIDDLEWARE ===
      - traefik.http.middlewares.crm-apidocs-auth.basicauth.users=apidocs:$2y$05$.oq21zUni1RtZmPDIux4EucYk3wlu3Tya65E2Nn7Am5FFjiKSWA/6
      - traefik.http.services.crm-svc.loadbalancer.server.port=80
      # Middleware: expliciete headers doorgeven
      - traefik.http.middlewares.crm-forward-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.middlewares.crm-forward-headers.headers.customrequestheaders.X-Forwarded-Port=443
      - traefik.http.middlewares.crm-forward-headers.headers.customrequestheaders.X-Forwarded-Host=crm.local.privatescan.nl
      - traefik.docker.network=public
      - logging=promtail
    volumes:
      - '.:/usr/share/nginx/html'
      - './certs:/certs:ro'
      - './crm_storage:/usr/share/nginx/html/storage/app/public'
    extra_hosts:
      - "clinicdev.local.privatescan.nl:host-gateway"
      - "patientdev.local.privatescan.nl:host-gateway"
      - "formsdev.local.privatescan.nl:host-gateway"
      - "sso.local.privatescan.nl:host-gateway"
    networks:
      public:
      backend:
      privateforms_form_traefik:
    depends_on:
      - mysql_crm

  mysql_crm:
    image: 'mysql/mysql-server:8.0'
    container_name: mysql_crm
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
      FORMS_DB_PASSWORD: '${FORMS_DB_PASSWORD}'
    volumes:
      - 'crm-mysql:/var/lib/mysql'
      # note: in prod, these are copies by update-and-run.sh
      - './.docker/mysql/init-forms.sh:/docker-entrypoint-initdb.d/21-init-forms.sh'
    networks:
      - backend
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-p${DB_PASSWORD}'
      retries: 3
      timeout: 5s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql_crm
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: '${DB_PASSWORD}'
      UPLOAD_LIMIT: 300M
    labels:
      - traefik.enable=true
      - traefik.http.routers.pma.rule=Host("phpmyadmin.local.privatescan.nl")
      - traefik.http.routers.pma.entrypoints=https
      - traefik.http.routers.pma.tls=true
      - traefik.http.services.pma.loadbalancer.server.port=80
      - traefik.docker.network=public
    networks:
      - backend
      - public
    depends_on:
      - mysql_crm

  mailpit:
    image: 'axllent/mailpit:latest'
    ports:
      - '${FORWARD_MAILPIT_PORT:-1025}:1025'
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - backend

  k6:
    image: grafana/k6:latest
    container_name: k6
    working_dir: /scripts
    volumes:
      - ./k6-scripts:/scripts
    networks:
      - backend
    depends_on:
      - crm

  loki-init:
    image: alpine:latest
    container_name: loki-init
    user: root
    volumes:
      - loki-data:/loki
      - ./docker/loki/init-loki.sh:/init-loki.sh:ro
    command: sh /init-loki.sh
    networks:
      - backend
    restart: "no"

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    user: "10001:10001"
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
      - ./.docker/config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    networks:
      - backend
    labels:
      - logging=promtail
    depends_on:
      loki-init:
        condition: service_completed_successfully

  promtail:
    image: grafana/promtail:3.5.8
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./.docker/config/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - public
      - backend
    labels:
      - logging=promtail
    depends_on:
      - loki

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    env_file:
      - .env.keycloak
    environment:
      TZ: Europe/Amsterdam
      KC_HOSTNAME: "sso.local.privatescan.nl"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_PROXY: "edge"
      KC_PROXY_ADDRESS_FORWARDING: "true"
      KC_THEME_CACHE: "false"
      KC_THEME_STATIC_MAX_AGE: "-1"
    entrypoint: >
      /bin/sh -c "
        /opt/keycloak/bin/kc.sh build --features=token-exchange &&
        exec /opt/keycloak/bin/kc.sh start --optimized
      "
    ports:
      - "8085:8080"
      - "8443:8443"
    networks:
      public:
      backend:
    volumes:
      - ./.docker/keycloak/providers:/opt/keycloak/providers
      - ./.docker/keycloak/themes:/opt/keycloak/themes
    depends_on:
      - keycloak-db
    labels:
      - traefik.enable=true
      - traefik.http.routers.keycloak.rule=Host("sso.local.privatescan.nl")
      - traefik.http.routers.keycloak.entrypoints=https
      - traefik.http.routers.keycloak.tls=true
      - traefik.http.routers.keycloak.tls.domains[0].main=sso.local.privatescan.nl
      - traefik.http.routers.keycloak.service=keycloak-svc
      - traefik.http.services.keycloak-svc.loadbalancer.server.port=8080
      - traefik.http.middlewares.keycloak-forward-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.middlewares.keycloak-forward-headers.headers.customrequestheaders.X-Forwarded-Port=443
      - traefik.http.middlewares.keycloak-forward-headers.headers.customrequestheaders.X-Forwarded-Host=sso.local.privatescan.nl
      - traefik.http.routers.keycloak.middlewares=keycloak-forward-headers
      - traefik.docker.network=public
      - logging=promtail

  keycloak-db:
    image: postgres:15-alpine
    container_name: keycloak-db
    restart: unless-stopped
    env_file:
      - .env.keycloak
    ports:
      - "5432:5432"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak_user} -d ${POSTGRES_DB:-keycloak}" ]
      interval: 10s
      timeout: 5s
      retries: 5

