[www]
user = www-data
group = www-data

listen = /run/fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Belangrijk voor Docker logging
catch_workers_output = yes
decorate_workers_output = no
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /proc/self/fd/2

; Access log naar file (niet naar stderr/Grafana)
access.log = /var/log/php-fpm/access.log
; Alleen errors naar stderr (voor Grafana)
access.format = "FPM: [%t] %m %{REQUEST_SCHEME}e://%{HTTP_HOST}e%{REQUEST_URI}e %f pid:%p took:%ds mem:%{mega}Mmb cpu:%C%% status:%s {%{REMOTE_ADDR}e|%{HTTP_USER_AGENT}e}"

; Eventueel iets als:
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
