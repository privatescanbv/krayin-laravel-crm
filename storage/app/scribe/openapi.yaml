openapi: 3.0.3
info:
  title: 'Privatescan CRM API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'https://crm.local.privatescan.nl'
tags:
  -
    name: Endpoints
    description: ''
  -
    name: Keycloak
    description: ''
  -
    name: 'Patient appointments'
    description: ''
  -
    name: 'Patient documents'
    description: ''
  -
    name: 'Patient messages'
    description: ''
  -
    name: 'Patient notifications'
    description: ''
  -
    name: 'Patient preferences'
    description: ''
components:
  securitySchemes:
    default:
      type: apiKey
      name: X-API-KEY
      in: header
      description: 'Send your API key in the <code>X-API-KEY</code> header (or authenticate with a Keycloak <code>Authorization: Bearer &lt;token&gt;</code> token).'
security:
  -
    default: []
paths:
  /api/leads/hernia:
    post:
      summary: 'Create a Hernia lead from the inbound (Gravity Forms) payload schema.'
      operationId: createAHerniaLeadFromTheInboundGravityFormsPayloadSchema
      description: ''
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: '{YOUR_AUTH_KEY}'
          schema:
            type: string
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Lead created successfully.'
                  lead_id: 123
                  data:
                    id: 123
                properties:
                  message:
                    type: string
                    example: 'Lead created successfully.'
                  lead_id:
                    type: integer
                    example: 123
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 123
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                campaign_id:
                  type: string
                  description: 'Marketing campaign external id (UUID). Dit is **niet** de numerieke database id, maar `marketing_campaigns.external_id` (model: `Webkul\Marketing\Models\Campaign`). The <code>external_id</code> of an existing record in the marketing_campaigns table.'
                  example: 69b238c0-e630-b733-2bb3-4fd85ff554da
                lead_source:
                  type: string
                  description: 'Broncode (string) die gemapt wordt naar lead_source_id. Zelfde mapping als in `InboundLeadPayloadMapper::mapLeadSourceId()`. Bij geen match: default naar "Anders" (lead_source_id=32).'
                  example: Herniapoli.nl
                kanaal_c:
                  type: string
                  description: 'Kanaal (string) die gemapt wordt naar lead_channel_id. Ondersteunde waarden: telefoon, website, email (of e-mail), tel-en-tel, agenten, partners, social media (of socialmedia), webshop, campagne. Bij geen match: default naar Website (lead_channel_id=2).'
                  example: website
                soort_aanvraag_c:
                  type: string
                  description: 'Type aanvraag (string) die gemapt wordt naar lead_type_id. Ondersteunde waarden: preventie (1), gericht (2), operatie (3), overig (4). Bij geen match: default naar Overig (lead_type_id=4).'
                  example: operatie
                salutation:
                  type: string
                  description: 'Enum-achtige waarde. Toegestane waarden: "Dhr.", "Mevr." (ook "Mr."/"Mrs." wordt geaccepteerd en omgezet). Bij geen match: validatie faalt (422) omdat de lead-validatie alleen "Dhr."/"Mevr." accepteert.'
                  example: Dhr.
                  nullable: true
                first_name:
                  type: string
                  description: ''
                  example: architecto
                last_name:
                  type: string
                  description: ''
                  example: architecto
                birthdate:
                  type: string
                  description: 'Must be a valid date in the format <code>Y-m-d</code>.'
                  example: '2026-02-04'
                  nullable: true
                email1:
                  type: string
                  description: 'Must be a valid email address.'
                  example: zbailey@example.net
                phone_mobile:
                  type: string
                  description: 'Telefoonnummer. Wordt genormaliseerd naar E.164 (bv 0612345678 → +31612345678) vóór validatie.'
                  example: '0612345678'
                  nullable: true
                primary_huisnr_c:
                  type: string
                  description: 'Huisnummer (optioneel).'
                  example: '12'
                  nullable: true
                primary_huisnr_toevoeging_c:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
                primary_address_postalcode:
                  type: string
                  description: 'Postcode (optioneel).'
                  example: 1234AB
                  nullable: true
                description:
                  type: string
                  description: ''
                  example: 'Eius et animi quos velit et.'
                  nullable: true
              required:
                - campaign_id
                - lead_source
                - kanaal_c
                - soort_aanvraag_c
                - first_name
                - last_name
                - email1
  /api/leads/privatescan:
    post:
      summary: 'Create a Privatescan lead from the inbound (Web-to-person) payload schema.'
      operationId: createAPrivatescanLeadFromTheInboundWebToPersonPayloadSchema
      description: ''
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: '{YOUR_AUTH_KEY}'
          schema:
            type: string
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Lead created successfully.'
                  lead_id: 123
                  data:
                    id: 123
                properties:
                  message:
                    type: string
                    example: 'Lead created successfully.'
                  lead_id:
                    type: integer
                    example: 123
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 123
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lead_source:
                  type: string
                  description: 'Broncode (string) die gemapt wordt naar lead_source_id. Ondersteunde waarden o.a.: bodyscannl, privatescannl, mriscannl, ccsvionlinenl, ccsvionlinecom, bodyscan.nl, privatescan.nl, mri-scan.nl, ccsvi-online.nl, ccsvi-online.com, google zoeken, adwords, krant telegraaf, krant spits, krant regionaal, krant overige dagbladen, krant redactioneel, magazine dito, magazine humo belgie, dokterdokter.nl, vrouw.nl, dito-magazine.nl, groupdeal.nl, marktplaats, zorgplanet.nl, linkpartner, youtube, linkedin, twitter, facebook, rtl business class, nieuwsbrief, bestaande klant, zakenrelatie, vrienden, familie, kennissen, collega, anders, wegener webshop, herniapoli.nl. Bij geen match: default naar "Anders" (lead_source_id=32).'
                  example: privatescannl
                kanaal_c:
                  type: string
                  description: 'Kanaal (string) die gemapt wordt naar lead_channel_id. Ondersteunde waarden: telefoon, website, email (of e-mail), tel-en-tel, agenten, partners, social media (of socialmedia), webshop, campagne. Bij geen match: default naar Website (lead_channel_id=2).'
                  example: website
                soort_aanvraag_c:
                  type: string
                  description: 'Type aanvraag. Voor deze endpoint alleen "preventie" (wordt lead_type_id=1). Bij geen match: default naar Overig (lead_type_id=4).'
                  example: preventie
                  enum:
                    - preventie
                salutation:
                  type: string
                  description: 'Enum-achtige waarde. Toegestane waarden: "Mr.", "Mrs." of false. Mapping: "Mr." → "Dhr.", "Mrs." → "Mevr.". Bij false/null: geen aanspreekvorm (salutation wordt leeg).'
                  example: Mr.
                  nullable: true
                first_name:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
                last_name:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: zbailey@example.net
                  nullable: true
                phone:
                  type: string
                  description: 'Telefoonnummer. Wordt genormaliseerd naar E.164 (bv 0612345678 → +31612345678) vóór validatie.'
                  example: '0611111111'
                  nullable: true
                assigned_user_id:
                  type: string
                  description: ''
                  example: null
                  nullable: true
                description:
                  type: string
                  description: ''
                  example: 'Eius et animi quos velit et.'
                  nullable: true
                url:
                  type: string
                  description: 'Must be a valid URL.'
                  example: 'http://www.ernser.org/harum-mollitia-modi-deserunt-aut-ab-provident-perspiciatis-quo.html'
                  nullable: true
                section:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
                select_verzoek:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
                select_interesse:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
                personen:
                  type: string
                  description: ''
                  example: null
                  nullable: true
                campaign_id:
                  type: string
                  description: 'Marketing campaign external id (UUID). Dit is **niet** de numerieke database id, maar `marketing_campaigns.external_id` (model: `Webkul\Marketing\Models\Campaign`). Wordt vaak gezet vanuit een cookie/UTM id. The <code>external_id</code> of an existing record in the marketing_campaigns table.'
                  example: 69b238c0-e630-b733-2bb3-4fd85ff554da
                  nullable: true
              required:
                - lead_source
                - kanaal_c
                - soort_aanvraag_c
  /api/leads:
    post:
      summary: 'Store a newly created lead in storage.'
      operationId: storeANewlyCreatedLeadInStorage
