services:
  crm:
    build:
      context: ./vendor/laravel/sail/runtimes/8.3
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.3/app
    container_name: crm
    stdin_open: true
    tty: true
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
      - '8000:80'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-debug}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    env_file:
      - .env
    labels:
      - 'dev.orbstack.domains=${TRAEFIK_URL}'
      - traefik.enable=true
      - traefik.http.routers.laravel-template-api-rtr.rule=Host(`$TRAEFIK_URL`)
      - traefik.http.routers.laravel-template-api-rtr.tls=true
      - traefik.http.routers.laravel-template-api-rtr.entrypoints=https
      - traefik.http.routers.laravel-template-api-rtr.service=laravel-template-api-svc
      - traefik.http.services.laravel-template-api-svc.loadbalancer.server.port=80
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
      - mb_traefik
    depends_on:
      - mysql
  #      - redis

  mysql:
    image: 'mysql/mysql-server:8.0'
    ports:
      #      - '${FORWARD_DB_PORT:-3306}:3306'
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'sail-mysql:/var/lib/mysql'
      - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
      - './docker/mysql/init-grant.sql:/docker-entrypoint-initdb.d/20-init-grant.sql'
    networks:
      - sail
      - mb_traefik
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-p${DB_PASSWORD}'
      retries: 3
      timeout: 5s

  #  krayin-phpmyadmin:
  #    image: phpmyadmin:latest
  #    restart: always
  #    environment:
  #      PMA_HOST: krayin-mysql
  #      PMA_USER: root
  #      PMA_PASSWORD: root
  #    ports:
  #      - 8080:80 # adjust your port here, if you want to change

  #  This n8N will service for production workflows. For data flows, we will set up a separate n8n instance and will run on our data server.
  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=sqlite
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme
      - N8N_HOST=n8n.local
      - N8N_PORT=5678
      - TZ=Europe/Amsterdam
    networks:
      - sail
      - mb_traefik
    volumes:
      - ./data/n8n_data:/home/node/.n8n

  mailserver:
    image: mailserver/docker-mailserver:latest
    hostname: mail
    domainname: test.local
    container_name: mailserver
    env_file: mailserver.env
    environment:
      - SSL_TYPE=manual
      - SSL_CERT_PATH=/tmp/docker-mailserver/ssl/mail.test.local-cert.pem
      - SSL_KEY_PATH=/tmp/docker-mailserver/ssl/mail.test.local-key.pem
    volumes:
      - ./maildata:/var/mail
      - ./mailstate:/var/mail-state
      - ./docker/config/:/tmp/docker-mailserver/
    ports:
      - "1025:25"     # SMTP inkomend (van Laravel)
      - "587:587"     # SMTP met AUTH (voor RainLoop)
      - "993:993"     # IMAPS voor Webklex of mailclient
    restart: always
    cap_add:
      - NET_ADMIN
    networks:
      - sail
  # visueel mailtjes kunnen lezen (local development)
  rainloop:
    image: hardware/rainloop
    container_name: rainloop
    ports:
      - "8888:8888"  # Webmail
    restart: unless-stopped
    depends_on:
      - mailserver
    networks:
      - sail
      - mb_traefik
    volumes:
      - './docker/rainloop_data:/rainloop/data'
# enable this for local cucumber testing
#  test:
#    build:
#      context: .
#      dockerfile: ./docker/php/Dockerfile.test
#    volumes:
#      - .:/app
#    networks:
#      - sail
#    depends_on:
#      - crm
#      - n8n
#    command: ./vendor/bin/behat --format=pretty

  ai-agent:
    build: ./ai-agents/ai-agent
    container_name: ai-agent
    env_file:
      - .env.ai
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USERNAME}
      - DB_PASS=${DB_PASSWORD}
      - DB_NAME=${DB_DATABASE}
    ports:
      - "8001:8001"
    depends_on:
      - mysql
    networks:
      - sail
      - mb_traefik

  ai-frontend:
    build: ./ai-agents/ai-frontend
    container_name: ai-frontend
    ports:
      - "8501:8501"
    depends_on:
      - ai-agent
    networks:
        - sail

  ai-visualizer:
    build: ./ai-agents/ai-visualizer
    container_name: ai-visualizer
    ports:
      - "8002:8002"
    env_file:
      - .env.ai
    networks:
      - sail
      - mb_traefik

  k6:
    image: grafana/k6:latest
    container_name: k6
    working_dir: /scripts
    volumes:
      - ./k6-scripts:/scripts
    networks:
      - sail
    depends_on:
      - crm

networks:
  sail:
    driver: bridge
  mb_traefik:
    external: true

volumes:
  sail-mysql:
    driver: local

#  sail-redis:
#    driver: local
