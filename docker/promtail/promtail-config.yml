server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        regex: '(crm|forms|n8n|mysql|traefik|suitecrm|phpmyadmin)'
        target_label: 'app'
      - action: keep
        source_labels: ['__meta_docker_container_name']
        regex: '.+'

    pipeline_stages:
      # 1️⃣ Combine JSON and PHP stacktrace logs
      - multiline:
          # Combine JSON logs ({}) and PHP stacktraces ([ or #)
          firstline: '^(?:\s*\{|\[.*exception\]|\#\d+)'
          max_wait_time: 3s
          max_lines: 500

      # 2️⃣ Parse Docker’s JSON wrapper
      - json:
          expressions:
            output: log
            stream: stream

      # 3️⃣ Handle JSON Laravel logs (complete JSON objects only)
      - match:
          selector: '{output=~"^\\{.*\\}\\s*$"}'
          stages:
            - json:
                expressions:
                  message: message
                  context: context
                  level: level
                  level_name: level_name
                  channel: channel
                  datetime: datetime
                  extra: extra
                source: output
                drop_malformed: true
            - labels:
                level_name:
                channel:
            - match:
                selector: '{datetime!=""}'
                stages:
                  - timestamp:
                      source: datetime
                      format: RFC3339Nano
            - match:
                selector: '{context!=""}'
                stages:
                  - json:
                      expressions:
                        context_error: error
                        context_trace: trace
                      source: context
                      drop_malformed: true
                  - labels:
                      context_error:

      # 4️⃣ Handle non-JSON logs (PHP, MySQL, Nginx, etc.)
      - match:
          selector: '{output!~"^{.*"}'
          stages:
            - regex:
                # Detect typical log lines or PHP traces
                expression: '^(?P<level_name>DEBUG|INFO|NOTICE|WARNING|WARN|ERROR|CRITICAL|ALERT|EMERGENCY|FATAL)?\s*(?P<message>.*)$'
                source: output
            - replace:
                expression: '^WARN$'
                source: level_name
                replace: 'WARNING'
            - replace:
                expression: '^$'
                source: level_name
                replace: 'INFO'
            - labels:
                level_name:
                message:
