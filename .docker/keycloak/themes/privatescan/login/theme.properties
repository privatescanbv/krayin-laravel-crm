parent=keycloak.v2
import=common/keycloak
styles=css/style.css
locales=nl,en
defaultLocale=nl


# CRM-driven forgot-password flow.
# The CRM owns mail delivery (Microsoft Graph + DB templates) and the Keycloak
# Admin API password update, so login.ftl points "Wachtwoord vergeten?" here
# instead of Keycloak's built-in resetCredentials flow.
patient.forgot.password.url=${env.FORMS_FRONTEND_URL}/patient/forgot-password
