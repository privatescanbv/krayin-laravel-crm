                  description: ''
                  example: architecto
              required:
                - body
    get:
      summary: 'Get all patient messages for a person, grouped by thread.'
      operationId: getAllPatientMessagesForAPersonGroupedByThread
      description: ''
      parameters:
        -
          in: query
          name: page
          description: 'Page number.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Page number.'
            example: 1
        -
          in: query
          name: per_page
          description: 'Items per page (max 100).'
          example: 15
          required: false
          schema:
            type: integer
            description: 'Items per page (max 100).'
            example: 15
        -
          in: header
          name: X-API-KEY
          description: ''
          example: '{YOUR_AUTH_KEY}'
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: Success
                    type: object
                    example:
                      data:
                        -
                          id: 1
                          person_id: 123
                          sender_type: patient
                          sender_id: null
                          body: Hallo
                          is_read: false
                          created_at: '2026-02-01T10:00:00+01:00'
                          updated_at: '2026-02-01T10:00:00+01:00'
                          sender: null
                          sender_name: Patient
                      meta:
                        current_page: 1
                        per_page: 15
                        total: 42
                    properties:
                      data:
                        type: array
                        example:
                          -
                            id: 1
                            person_id: 123
                            sender_type: patient
                            sender_id: null
                            body: Hallo
                            is_read: false
                            created_at: '2026-02-01T10:00:00+01:00'
                            updated_at: '2026-02-01T10:00:00+01:00'
                            sender: null
                            sender_name: Patient
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            person_id:
                              type: integer
                              example: 123
                            sender_type:
