name: CI

on: [push, pull_request]

jobs:
  tests-and-ui:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: krayin
        ports:
          - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: curl, gd, intl, mbstring, openssl, pdo, pdo_mysql, tokenizer, zip
          ini-values: error_reporting=E_ALL
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install

      - name: Configure environment
        run: |
          cp .env.example .env
          sed -i "s|^\(APP_ENV=\s*\).*$|\1testing|" .env
          sed -i "s|^\(DB_HOST=\s*\).*$|\1127.0.0.1|" .env
          sed -i "s|^\(DB_PORT=\s*\).*$|\1${{ job.services.mysql.ports['3306'] }}|" .env
          sed -i "s|^\(DB_DATABASE=\s*\).*$|\1krayin|" .env
          sed -i "s|^\(DB_USERNAME=\s*\).*$|\1root|" .env
          sed -i "s|^\(DB_PASSWORD=\s*\).*$|\1root|" .env

      - name: Install Krayin (DB, config)
        run: php artisan krayin-crm:install --skip-env-check --skip-admin-creation

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Admin frontend dependencies
        working-directory: packages/Webkul/Admin
        run: npm ci

      - name: Build Admin assets
        working-directory: packages/Webkul/Admin
        run: npm run build

      - name: Run backend tests
        run: |
          set -o pipefail
          php artisan test --parallel --colors=always --log-junit backend_junit.xml | tee backend_tests.txt

      - name: Start Laravel server
        run: php artisan serve --host=0.0.0.0 --port=8000 &

      - name: Wait for Laravel
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "Laravel is up!"
              exit 0
            fi
            echo "Waiting for Laravel..."
            sleep 3
          done
          echo "Laravel did not start in time" >&2
          exit 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore .NET dependencies
        run: dotnet restore ./UiTests/UiTests.csproj

      - name: Build UI tests
        run: dotnet build ./UiTests/UiTests.csproj --configuration Release --nologo

      - name: Run UI tests
        run: |
          set -o pipefail
          dotnet test ./UiTests/UiTests.csproj --configuration Release --no-build --logger "trx;LogFileName=test_results.trx" | tee ui_tests.txt
        env:
          TestSettings__BaseUrl: http://localhost:8000

      - name: Collect Laravel log (if exists)
        if: always()
        run: |
          if [ -f storage/logs/laravel.log ]; then
            cp storage/logs/laravel.log laravel.log || true
          fi

      - name: Upload CI error artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-errors
          path: |
            backend_tests.txt
            backend_junit.xml
            ui_tests.txt
            test_results.trx
            laravel.log
