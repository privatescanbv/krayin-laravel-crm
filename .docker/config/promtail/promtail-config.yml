server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        regex: '(crm|forms|n8n|mysql|traefik|suitecrm|phpmyadmin)'
        target_label: 'app'
      - action: keep
        source_labels: ['__meta_docker_container_name']
        regex: '.+'

    pipeline_stages:
      # 1️⃣ Combine multi-line JSON logs BEFORE parsing Docker wrapper
      # Only combine Docker JSON entries where the log content starts with { (actual JSON objects)
      # This prevents non-JSON logs (like n8n plain text) from being incorrectly combined
      - multiline:
          # Match Docker JSON wrapper where log content starts with {
          firstline: '^\\s*\\{\\s*"log"\\s*:\\s*"\\s*\\{'
          max_wait_time: 3s
          max_lines: 500
          # Continue if line doesn't end with complete Docker JSON entry (ending with "})
          continuation: '.*[^"]\\}\\s*$'

      # 2️⃣ Parse Docker's JSON wrapper
      - json:
          expressions:
            output: log
            stream: stream

      # 3️⃣ Handle JSON Laravel logs (complete JSON objects only)
      # Only parse as JSON if it starts and ends with { }
      - match:
          selector: '{output=~"^\\s*\\{.*\\}\\s*$"}'
          stages:
            - json:
                expressions:
                  message: message
                  context: context
                  level: level
                  level_name: level_name
                  channel: channel
                  datetime: datetime
                  extra: extra
                source: output
                drop_malformed: true
            - labels:
                level_name:
                channel:
            - match:
                selector: '{datetime!=""}'
                stages:
                  - timestamp:
                      source: datetime
                      format: RFC3339Nano
            - match:
                selector: '{context!=""}'
                stages:
                  - json:
                      expressions:
                        context_error: error
                        context_trace: trace
                      source: context
                      drop_malformed: true
                  - labels:
                      context_error:

      # 4️⃣ Handle non-JSON logs (n8n, PHP, MySQL, Nginx, etc.)
      # Match logs that don't start with { (not JSON) OR logs that start with { but don't end with } (incomplete JSON)
      - match:
          selector: '{output!~"^\\s*\\{.*\\}\\s*$"}'
          stages:
            # Try multiple regex patterns to extract log level
            # Pattern 1: "[INFO] message" or "[ERROR] message"
            - regex:
                expression: '^\\[(?P<level_name>DEBUG|INFO|NOTICE|WARNING|WARN|ERROR|CRITICAL|ALERT|EMERGENCY|FATAL)\\]\\s+(?P<message>.*)$'
                source: output
            # Pattern 2: "ERROR message" or "WARN message" (without brackets)
            - regex:
                expression: '^(?P<level_name>DEBUG|INFO|NOTICE|WARNING|WARN|ERROR|CRITICAL|ALERT|EMERGENCY|FATAL)\\s+(?P<message>.*)$'
                source: output
            # Pattern 3: Timestamp + level (e.g., "2024-01-01 12:00:00 INFO message")
            - regex:
                expression: '^\\d{4}-\\d{2}-\\d{2}[\\sT]\\d{2}:\\d{2}:\\d{2}[,\\.]?\\d*\\s+(?P<level_name>DEBUG|INFO|NOTICE|WARNING|WARN|ERROR|CRITICAL|ALERT|EMERGENCY|FATAL)\\s+(?P<message>.*)$'
                source: output
            # Pattern 4: Default - extract entire line as message if no level found
            - regex:
                expression: '^(?P<message>.*)$'
                source: output
            - replace:
                expression: '^WARN$'
                source: level_name
                replace: 'WARNING'
            - replace:
                expression: '^$'
                source: level_name
                replace: 'INFO'
            - labels:
                level_name:
                message:
