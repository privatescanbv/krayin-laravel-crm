services:

  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=public
      - --entrypoints.http.address=:80
      - --entrypoints.https.address=:443
      - --certificatesresolvers.myresolver.acme.httpchallenge=true
      - --certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=http
      - --certificatesresolvers.myresolver.acme.email=mark.bulthuis@mbsoftware.nl
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
      - --entrypoints.http.http.redirections.entryPoint.to=https
      - --entrypoints.http.http.redirections.entryPoint.scheme=https
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      public:
        aliases:
          - sso.dev.privatescan.nl
          - newcrm.dev.privatescan.nl
          - patient.dev.privatescan.nl

  crm:
    image: ghcr.io/privatescanbv/krayin-laravel-crm/krayincrm:latest
    container_name: crm
    restart: unless-stopped
    stdin_open: true
    tty: true
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    env_file:
      - .env
    labels:
      - traefik.enable=true
      - traefik.http.routers.crm.rule=Host("newcrm.dev.privatescan.nl")
      - traefik.http.routers.crm.entrypoints=https
      - traefik.http.routers.crm.tls=true
      - traefik.http.routers.crm.tls.certresolver=myresolver
      - traefik.http.routers.crm.service=crm-svc
      - traefik.http.services.crm-svc.loadbalancer.server.port=80
      # Middleware: expliciete headers doorgeven
      - traefik.http.middlewares.crm-forward-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.middlewares.crm-forward-headers.headers.customrequestheaders.X-Forwarded-Port=443
      - traefik.http.middlewares.crm-forward-headers.headers.customrequestheaders.X-Forwarded-Host=newcrm.dev.privatescan.nl
      - traefik.docker.network=public
      - logging=promtail
    volumes:
      - '/home/mbulthuis/upload:/var/www/html/upload_sugarcrm'
    networks:
      - backend
      - public
    depends_on:
      - mysql
      - n8n
#      - mailserver

  mysql:
    image: 'mysql/mysql-server:8.0'
    container_name: mysql
    ports:
      - '3307:3306'
    command: --skip-host-cache --skip-name-resolve --socket=/tmp/mysql.sock
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'sail-mysql:/var/lib/mysql'
#      - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
      - './docker/mysql/init-n8n.sql:/docker-entrypoint-initdb.d/20-init-n8n.sql'
      - './docker/mysql/init-forms.sql:/docker-entrypoint-initdb.d/21-init-forms.sql'
    networks:
      - backend
      - public
#    healthcheck:
#      test: ["CMD", "mysqladmin", "ping", "-p$DB_PASSWORD"]
#      retries: 3
#      timeout: 5s

  #  This n8N will service for production workflows. For data flows, we will set up a separate n8n instance and will run on our data server.
  n8n:
    image: n8nio/n8n:stable
    container_name: n8n
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_TYPE: 'mysqldb'
      N8N_BASIC_AUTH_ACTIVE: 'false'
#      N8N_BASIC_AUTH_USER: 'admin'
#      N8N_BASIC_AUTH_PASSWORD: "V!*q3&hD8Lsq8yL3RdAY"
      N8N_API_KEY: '${N8N_API_KEY}'
      N8N_HOST: 'n8n.local'
      N8N_PORT: 5678
      TZ: 'Europe/Amsterdam'
      N8N_ENCRYPTION_KEY: 'FUC16A-23(<d!io'
      N8N_RUN_MIGRATIONS: 'true'
      N8N_RUNNERS_ENABLED: 'true'
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.rule=Host("n8ncrm.dev.privatescan.nl")
      - traefik.http.routers.n8n.entrypoints=https
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.tls.certresolver=myresolver
      - traefik.http.routers.n8n.service=n8n-svc
      - traefik.http.services.n8n-svc.loadbalancer.server.port=5678
      - traefik.docker.network=public
      - logging=promtail
    networks:
      - backend
      - public
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - mysql

  n8n-sync:
    image: ghcr.io/privatescanbv/krayin-laravel-crm/crmsyncn8n:latest
    container_name: n8n-sync
    env_file:
      - .env
    environment:
      N8N_RUNNERS_ENABLED: 'true'
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: 'true'
      DB_TYPE: 'mysqldb'
      N8N_HOST: 'n8n'
      N8N_PORT: '5678'
      N8N_API_URL: 'http://n8n:5678/api/v1/workflows'
    depends_on:
      - n8n
    networks:
      - backend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: '${DB_PASSWORD}'
      UPLOAD_LIMIT: 300M
    labels:
      - traefik.enable=true
      - traefik.http.routers.pma.rule=Host("phpmyadmin.dev.privatescan.nl")
      - traefik.http.routers.pma.entrypoints=https
      - traefik.http.routers.pma.tls=true
      - traefik.http.routers.pma.tls.certresolver=myresolver
      - traefik.http.routers.pma.middlewares=pma-auth
      - traefik.http.middlewares.pma-auth.basicauth.users=admin:$$2y$$05$$13501WAPEwnZGYkGbsZ.duBZGb.C9wQYQiAqeIZM8SyAqTuAVd7Xe
      - traefik.http.services.pma.loadbalancer.server.port=80
      - traefik.docker.network=public
      - logging=promtail
    networks:
      - backend
      - public
    depends_on:
      - mysql

  suitecrm:
    image: ghcr.io/privatescanbv/privatecrm/suitecrm:1.0
    container_name: suitecrm
    ports:
      - "81:80"
    environment:
      SITE_URL: 'https://suitecrm.dev.privatescan.nl'
    labels:
      - traefik.enable=true
      - traefik.docker.network=public
      - traefik.http.routers.suitecrm.rule=Host("suitecrm.dev.privatescan.nl")
      - traefik.http.routers.suitecrm.entrypoints=https
      - traefik.http.routers.suitecrm.tls=true
      - traefik.http.routers.suitecrm.tls.certresolver=myresolver
      - traefik.http.routers.suitecrm.service=suitecrm-svc
      - traefik.http.services.suitecrm-svc.loadbalancer.server.port=80
      - traefik.http.middlewares.suitecrm-forward.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.middlewares.suitecrm-forward.headers.customrequestheaders.X-Forwarded-Port=443
      - traefik.http.middlewares.suitecrm-forward.headers.customrequestheaders.X-Forwarded-Host=suitecrm.dev.privatescan.nl
      - traefik.http.routers.suitecrm.middlewares=suitecrm-forward@docker
      - logging=promtail
    networks:
      - backend
      - public
    depends_on:
      - mysql

  forms:
    image: ghcr.io/privatescanbv/privateforms/forms:latest
    container_name: forms
    stdin_open: true
    tty: true
    env_file:
      - .env
    environment:
      WWWUSER: '${WWWUSER}'
      WWWGROUP: '${WWWGROUP}'
      APP_NAME: 'PrivateForms'
      APP_ENV: 'production'
      APP_KEY: 'base64:i8u5O+j9QB823zOyqJFjsqr2iINU9Z1cFdr5HTfKNOg='
      API_KEY_1: '4!LvFF3HNTUGz*E^X@kk'
      APP_DEBUG: 'false'
      APP_URL: "$PATIENT_PORTAL_URL"
      ASSET_URL: "$PATIENT_PORTAL_URL"
      POSTMARK_TOKEN: '3ea2bc92-4dd0-4bc5-af86-fb764e5d7af9'
      MAIL_FROM_ADDRESS: 'no-reply@privatescan.nl'
      MAIL_FROM_NAME: 'PrivateScan'
      APP_FALLBACK_LOCALE: 'en'
      APP_FAKER_LOCALE: 'en_US'
      APP_LOCALE: 'nl'
      APP_MAINTENANCE_DRIVER: 'file'
      PHP_CLI_SERVER_WORKERS: 4
      BCRYPT_ROUNDS: 12
      LOG_CHANNEL: 'stack'
      LOG_LEVEL: 'info'
      DB_CONNECTION: 'mysql'
      DB_HOST: 'mysql'
      DB_PORT: '3306'
      DB_DATABASE: 'forms'
      DB_USERNAME: 'formadmin'
      DB_PASSWORD: 'FUC16A-qsh(<d!io'
      APP_TIMEZONE: 'UTC'
      SESSION_DRIVER: 'file'
      SESSION_LIFETIME: 120
      SESSION_DOMAIN: ''
      SESSION_SECURE: 'false'
      SESSION_PATH: '/'
      BROADCAST_CONNECTION: 'log'
      FILESYSTEM_DISK: 'local'
      QUEUE_CONNECTION: 'database'
      CACHE_STORE: 'database'
      MEMCACHED_HOST: '127.0.0.1'
      FORWARD_REDIS_PORT: 6379
      EMAIL_VERIFICATION_BCC: 'mark.bulthuis@privatescan.nl'
      KEYCLOAK_BASE_URL: 'https://sso.dev.privatescan.nl'
      KEYCLOAK_REALM: '${KEYCLOAK_REALM}'
      KEYCLOAK_CLIENT_ID: 'patient-app'
      KEYCLOAK_LOAD_USER_FROM_DATABASE: 'false'
      KEYCLOAK_APPEND_DECODED_TOKEN: 'true'
      KEYCLOAK_ALLOWED_RESOURCES: 'patient-app'
      KEYCLOAK_LEEWAY: 60
      KEYCLOAK_CLIENT_SECRET: "$KEYCLOAK_CLIENT_SECRET_FORMS"
      CRM_API_KEY: "${API_KEY_1}"
      CRM_API_URL: "https://newcrm.dev.privatescan.nl/api/"
    labels:
      - traefik.enable=true
      # Patient portal router
      - traefik.http.routers.patient-rtr.rule=Host("patient.dev.privatescan.nl")
      - traefik.http.routers.patient-rtr.tls=true
      - traefik.http.routers.patient-rtr.tls.domains[0].main=patient.dev.privatescan.nl
      - traefik.http.routers.patient-rtr.entrypoints=https
      - traefik.http.routers.patient-rtr.service=formsdev-svc
      - traefik.http.routers.patient-rtr.middlewares=patient-forward-headers
      # Clinic portal router
      - traefik.http.routers.clinic-rtr.rule=Host("clinic.dev.privatescan.nl")
      - traefik.http.routers.clinic-rtr.tls=true
      - traefik.http.routers.clinic-rtr.tls.domains[0].main=clinic,dev.privatescan.nl
      - traefik.http.routers.clinic-rtr.entrypoints=https
      - traefik.http.routers.clinic-rtr.service=formsdev-svc
      - traefik.http.routers.clinic-rtr.middlewares=clinic-forward-headers
      # Service
      - traefik.http.services.formsdev-svc.loadbalancer.server.port=80
      # Middlewares
      - traefik.http.middlewares.patient-forward-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.middlewares.patient-forward-headers.headers.customrequestheaders.X-Forwarded-Port=443
      - traefik.http.middlewares.patient-forward-headers.headers.customrequestheaders.X-Forwarded-Host=patient.dev.privatescan.nl
      - traefik.http.middlewares.clinic-forward-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.middlewares.clinic-forward-headers.headers.customrequestheaders.X-Forwarded-Port=443
      - traefik.http.middlewares.clinic-forward-headers.headers.customrequestheaders.X-Forwarded-Host=clinic.dev.privatescan.nl
      - traefik.docker.network=public
      - logging=promtail
    networks:
      - backend
      - public
    depends_on:
      crm:
        condition: service_started
      mysql:
        condition: service_healthy

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    networks:
      - backend
    labels:
      - logging=promtail

  promtail:
    image: grafana/promtail:3.5.8
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_INSTALL_PLUGINS=
      - GF_SERVER_ROOT_URL=https://logs.dev.privatescan.nl
      - GF_SERVER_DOMAIN=logs.dev.privatescan.nl
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - backend
      - public
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host("logs.dev.privatescan.nl")
      - traefik.http.routers.grafana.entrypoints=https
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.tls.certresolver=myresolver
      - traefik.http.services.grafana.loadbalancer.server.port=3000
      - traefik.docker.network=public
      - logging=promtail
    depends_on:
      - loki

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    env_file:
      - .env.keycloak
    environment:
      TZ: Europe/Amsterdam
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      # KC_DB_USERNAME, KC_DB_PASSWORD, KC_BOOTSTRAP_ADMIN_USERNAME en KC_BOOTSTRAP_ADMIN_PASSWORD worden automatisch gekopieerd van KEYCLOAK_DB_USERNAME, KEYCLOAK_DB_PASSWORD, KEYCLOAK_ADMIN en KEYCLOAK_ADMIN_PASSWORD via entrypoint
      KC_HOSTNAME: sso.dev.privatescan.nl
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_PROXY: edge
    entrypoint: ["/bin/sh", "-c", "export KC_DB_USERNAME=$${KEYCLOAK_DB_USERNAME:-keycloak} && export KC_DB_PASSWORD=$${KEYCLOAK_DB_PASSWORD:-changeme} && export KC_BOOTSTRAP_ADMIN_USERNAME=$${KEYCLOAK_ADMIN} && export KC_BOOTSTRAP_ADMIN_PASSWORD=$${KEYCLOAK_ADMIN_PASSWORD} && exec /opt/keycloak/bin/kc.sh start"]
    networks:
      - backend
      - public
    depends_on:
      keycloak-db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.keycloak.rule=Host("sso.dev.privatescan.nl")
      - traefik.http.routers.keycloak.entrypoints=https
      - traefik.http.routers.keycloak.tls=true
      - traefik.http.routers.keycloak.tls.certresolver=myresolver
      - traefik.http.routers.keycloak.service=keycloak-svc
      - traefik.http.routers.keycloak.middlewares=keycloak-forward-headers@docker
      - traefik.http.services.keycloak-svc.loadbalancer.server.port=8080
      - traefik.http.middlewares.keycloak-forward-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.middlewares.keycloak-forward-headers.headers.customrequestheaders.X-Forwarded-Port=443
      - traefik.http.middlewares.keycloak-forward-headers.headers.customrequestheaders.X-Forwarded-Host=sso.dev.privatescan.nl
      - traefik.docker.network=public
      - logging=promtail
#    healthcheck:
#      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
#      interval: 30s
#      timeout: 10s
#      retries: 5

  keycloak-db:
    image: postgres:15-alpine
    container_name: keycloak-db
    restart: unless-stopped
    env_file:
      - .env.keycloak
    environment:
      POSTGRES_DB: keycloak
      # POSTGRES_USER en POSTGRES_PASSWORD worden automatisch gekopieerd van KEYCLOAK_DB_USERNAME en KEYCLOAK_DB_PASSWORD via entrypoint
    entrypoint: ["/bin/sh", "-c", "export POSTGRES_USER=$${KEYCLOAK_DB_USERNAME:-keycloak} && export POSTGRES_PASSWORD=$${KEYCLOAK_DB_PASSWORD:-changeme} && exec docker-entrypoint.sh postgres"]
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USERNAME:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5


networks:
  backend:
    driver: bridge
  public:
    external: true

volumes:
  sail-mysql:
    driver: local
  n8n_data:
    driver: local
  loki-data:
    driver: local
  grafana-data:
    driver: local
  keycloak-db-data:
    driver: local
