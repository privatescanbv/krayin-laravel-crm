networks:
  backend:
    driver: bridge
  public:
    driver: bridge
  privateforms_form_traefik:
    external: ${USE_EXTERNAL_TRAEFIK_NETWORK:-false}
    name: ${TRAEFIK_NETWORK_NAME:-privateforms_form_traefik}

volumes:
  crm-mysql:
    driver: local
  loki-data:
    driver: local
  grafana-data:
    driver: local
  keycloak-db-data:
    driver: local
