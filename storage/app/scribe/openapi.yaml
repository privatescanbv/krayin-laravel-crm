                  type: string
                  description: 'This field is required unless <code>type</code> is in <code>note</code> or <code>file</code>. Must be a valid date in the format <code>Y-m-d H:i:s</code>.'
                  example: '2026-02-04 08:29:03'
                schedule_to:
                  type: string
                  description: 'This field is required unless <code>type</code> is in <code>note</code> or <code>file</code>. Must be a valid date in the format <code>Y-m-d H:i:s</code>.'
                  example: '2026-02-04 08:29:03'
